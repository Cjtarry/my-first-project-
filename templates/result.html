<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Result</title>
    <style>
        :root {
            --bg-1: #0f172a;
            --bg-2: #1e293b;
            --card: #0b1220;
            --accent: #38bdf8;
            --accent-2: #22c55e;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --shadow: 0 25px 60px rgba(2, 6, 23, 0.55);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 40px 16px;
            font-family: "Sora", "Trebuchet MS", "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(900px 500px at 15% 10%, rgba(56, 189, 248, 0.2), transparent),
                radial-gradient(700px 400px at 85% 20%, rgba(34, 197, 94, 0.18), transparent),
                linear-gradient(135deg, var(--bg-1), var(--bg-2));
        }

        .card {
            width: min(720px, 100%);
            background: linear-gradient(145deg, rgba(15, 23, 42, 0.95), rgba(2, 6, 23, 0.95));
            border-radius: 24px;
            padding: 32px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(148, 163, 184, 0.18);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, rgba(56, 189, 248, 0.08), transparent 45%);
            pointer-events: none;
        }

        h2 {
            margin: 0 0 10px;
            font-size: 28px;
            letter-spacing: 0.4px;
        }

        .subtitle {
            margin: 0 0 24px;
            color: var(--muted);
            font-size: 14px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .stat {
            background: rgba(15, 23, 42, 0.65);
            border: 1px solid rgba(148, 163, 184, 0.12);
            border-radius: 16px;
            padding: 16px;
        }

        .label {
            font-size: 12px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .value {
            font-size: 20px;
            font-weight: 600;
        }

        .accent {
            background: linear-gradient(120deg, rgba(56, 189, 248, 0.2), rgba(34, 197, 94, 0.2));
            border-color: rgba(56, 189, 248, 0.4);
        }

        .actions {
            margin-top: 24px;
            display: flex;
            justify-content: flex-end;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 18px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            color: #0b1220;
            text-decoration: none;
            background: linear-gradient(120deg, var(--accent), var(--accent-2));
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(34, 197, 94, 0.25);
        }

        @media (max-width: 520px) {
            .card {
                padding: 24px;
            }

            h2 {
                font-size: 24px;
            }

            .actions {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Expense Summary</h2>
        <p class="subtitle">Here is a quick snapshot of your expense analysis.</p>

        <div class="grid">
            <div class="stat accent">
                <div class="label">Total Expense</div>
                <div class="value">{{ total }}</div>
            </div>
            <div class="stat">
                <div class="label">Total Items</div>
                <div class="value">{{ count }}</div>
            </div>
            <div class="stat">
                <div class="label">Highest Expense</div>
                <div class="value">{{ highest }}</div>
            </div>
            <div class="stat">
                <div class="label">Category</div>
                <div class="value">{{ category }}</div>
            </div>
            <div class="stat">
                <div class="label">Salary/Expense Ratio</div>
                <div class="value">{{ ratio }}</div>
            </div>
            <div class="stat">
                <div class="label">Savings</div>
                <div class="value">{{ savings }}</div>
            </div>
        </div>

        <div class="actions">
            <a class="btn" href="/">Go Back</a>
        </div>
    </div>
</body>
</html>
